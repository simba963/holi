<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಹೋಳಿ ಹಬ್ಬದ ಶುಭಾಶಯಗಳು</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family: "Noto Sans Kannada", sans-serif;
    text-align:center;
    color:white;
    background: linear-gradient(45deg,#ff0080,#ff8c00,#40e0d0,#ff0080);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    position:absolute;
    top:10%;
    width:100%;
    z-index:10;
}

h1{
    font-size:36px;
    margin-bottom:10px;
}

#sender{
    font-size:20px;
    margin-bottom:15px;
    font-weight:bold;
    color:#ffff00;
}

input{
    padding:10px;
    border-radius:25px;
    border:none;
    width:220px;
    text-align:center;
    font-size:14px;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:25px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
}

.shareBtn{background:white;color:#ff0080;}
.confettiBtn{background:#ffff00;color:black;}

canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌈 ಹೋಳಿ ಹಬ್ಬದ ಶುಭಾಶಯಗಳು 🎨</h1>
    <div id="sender"></div>

    <input type="text" id="nameInput" placeholder="ನಿಮ್ಮ ಹೆಸರು ನಮೂದಿಸಿ">
    <br>
    <button class="shareBtn" onclick="shareWhatsApp()">📲 ವಾಟ್ಸಾಪ್ ನಲ್ಲಿ ಹಂಚಿಕೊಳ್ಳಿ</button>
    <br>
    <button class="confettiBtn" onclick="megaConfetti()">💥 ಬಣ್ಣ ಸುರಿಸಿ</button>
</div>

<canvas id="canvas"></canvas>

<script>

/* ===== URL Name ===== */
var params = new URLSearchParams(window.location.search);
var name = params.get("name") || "ನಿಮ್ಮ ಸ್ನೇಹಿತ";
document.getElementById("sender").innerHTML =
name + " ಅವರಿಂದ ಹೋಳಿ ಹಬ್ಬದ ಹಾರ್ದಿಕ ಶುಭಾಶಯಗಳು!";

/* ===== Canvas Setup ===== */
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ===== Colors ===== */
function randomColor(){
    var colors=["#ff0080","#ffcc00","#00ffcc",
                "#ff3300","#6600ff","#00ff00",
                "#ff1493","#00bfff","#ffa500"];
    return colors[Math.floor(Math.random()*colors.length)];
}

/* ===== Particle Engine ===== */
var particles=[];

function createParticle(x,y,vx,vy,size,life){
    particles.push({
        x:x,
        y:y,
        vx:vx,
        vy:vy,
        size:size,
        color:randomColor(),
        life:life
    });
}

/* ===== Fountain ===== */
function fountain(x,y){
    for(var i=0;i<50;i++){
        createParticle(
            x,y,
            (Math.random()-0.5)*6,
            (Math.random()-1.5)*6,
            4+Math.random()*4,
            60
        );
    }
}

/* ===== Rainbow Trail ===== */
function trail(x,y){
    createParticle(x,y,0,0,4,30);
}

/* ===== Mega Confetti Button ===== */
function megaConfetti(){
    for(var i=0;i<300;i++){
        createParticle(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            (Math.random()-0.5)*8,
            (Math.random()-1.5)*8,
            5,
            80
        );
    }
}

/* ===== Animation Loop ===== */
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(var i=0;i<particles.length;i++){
        var p=particles[i];

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        p.x+=p.vx;
        p.y+=p.vy;
        p.vy+=0.1;
        p.life--;

        if(p.life<=0){
            particles.splice(i,1);
            i--;
        }
    }

    requestAnimationFrame(animate);
}
animate();

/* ===== Tap Fountain ===== */
canvas.addEventListener("click",function(e){
    fountain(e.clientX,e.clientY);
});

/* ===== Drag Trail ===== */
canvas.addEventListener("mousemove",function(e){
    if(e.buttons===1){
        trail(e.clientX,e.clientY);
    }
});

/* Mobile */
canvas.addEventListener("touchstart",function(e){
    var t=e.touches[0];
    fountain(t.clientX,t.clientY);
});
canvas.addEventListener("touchmove",function(e){
    var t=e.touches[0];
    trail(t.clientX,t.clientY);
});

/* ===== WhatsApp Share with Name ===== */
function shareWhatsApp(){
    var entered=document.getElementById("nameInput").value.trim();
    if(entered===""){
        alert("ದಯವಿಟ್ಟು ನಿಮ್ಮ ಹೆಸರು ನಮೂದಿಸಿ");
        return;
    }

    var base=window.location.origin+window.location.pathname;
    var newUrl=base+"?name="+encodeURIComponent(entered);

    var msg="🌈 ಹೋಳಿ ಹಬ್ಬದ ಶುಭಾಶಯಗಳು 🎨\n"
            +entered+" ಅವರಿಂದ ವಿಶೇಷ ಶುಭಾಶಯಗಳು!\n"
            +newUrl;

    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
