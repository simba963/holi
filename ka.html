<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ಹೋಳಿ ಹಬ್ಬದ ಶುಭಾಶಯಗಳು</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:'Noto Sans Kannada', sans-serif;
    background: linear-gradient(45deg,#ff0080,#ff8c00,#40e0d0,#ff0080);
    background-size:400% 400%;
    animation:gradient 12s ease infinite;
    text-align:center;
    color:white;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    position:absolute;
    top:15%;
    width:100%;
    z-index:10;
}

h1{
    font-size:38px;
    margin-bottom:10px;
    animation:float 2s infinite ease-in-out;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

#sender{
    font-size:20px;
    font-weight:bold;
    color:#fff200;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌈 ಹೋಳಿ ಹಬ್ಬದ ಶುಭಾಶಯಗಳು 🎨</h1>
    <div id="sender"></div>
</div>

<canvas id="canvas"></canvas>

<script>
/* ===== ಕನ್ನಡ ಹೆಸರು URL ನಿಂದ ಪಡೆಯುವುದು ===== */
var params = new URLSearchParams(window.location.search);
var name = params.get("name") || "ನಿಮ್ಮ ಸ್ನೇಹಿತ";
document.getElementById("sender").innerHTML =
    name + " ಅವರಿಂದ ಹೋಳಿ ಹಬ್ಬದ ಹಾರ್ದಿಕ ಶುಭಾಶಯಗಳು!";

/* ===== Canvas Setup ===== */
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ===== Random Color ===== */
function randomColor(){
    var colors=["#ff0080","#ffcc00","#00ffcc",
                "#ff3300","#6600ff","#00ff00",
                "#ff1493","#00bfff","#ffa500"];
    return colors[Math.floor(Math.random()*colors.length)];
}

/* ===== Multicolor Fountain Effect ===== */
function fountain(x,y){
    for(var i=0;i<40;i++){
        particles.push({
            x:x,
            y:y,
            radius:3+Math.random()*4,
            color:randomColor(),
            vx:(Math.random()-0.5)*6,
            vy:(Math.random()-1.5)*6,
            life:60
        });
    }
}

/* ===== Rainbow Trail ===== */
function trail(x,y){
    particles.push({
        x:x,
        y:y,
        radius:4,
        color:randomColor(),
        vx:0,
        vy:0,
        life:30
    });
}

/* ===== Particle Engine ===== */
var particles=[];

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(var i=0;i<particles.length;i++){
        var p=particles[i];

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        p.x+=p.vx;
        p.y+=p.vy;
        p.vy+=0.1; // gravity
        p.life--;

        if(p.life<=0){
            particles.splice(i,1);
            i--;
        }
    }
    requestAnimationFrame(animate);
}
animate();

/* ===== Tap → Fountain ===== */
function handleTap(e){
    var rect = canvas.getBoundingClientRect();
    var x = (e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var y = (e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    fountain(x,y);
}

/* ===== Drag → Rainbow Trail ===== */
function handleMove(e){
    var rect = canvas.getBoundingClientRect();
    var x = (e.touches?e.touches[0].clientX:e.clientX)-rect.left;
    var y = (e.touches?e.touches[0].clientY:e.clientY)-rect.top;
    trail(x,y);
}

/* Desktop */
canvas.addEventListener("click", handleTap);
canvas.addEventListener("mousemove", function(e){
    if(e.buttons===1){ handleMove(e); }
});

/* Mobile */
canvas.addEventListener("touchstart", handleTap);
canvas.addEventListener("touchmove", handleMove);

</script>

</body>
</html>
