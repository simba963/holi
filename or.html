<!DOCTYPE html>
<html lang="or" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>ହୋଲି ପର୍ବର ଶୁଭେଚ୍ଛା</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    margin:0;
    overflow:hidden;
}

/* Animated Background */
.bg-animate{
    background: linear-gradient(-45deg,#ff0080,#ff8c00,#40e0d0,#ff00ff,#00ff88);
    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}
@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

canvas{
    position:absolute;
    top:0;
    left:0;
}
</style>
</head>

<body class="bg-animate flex items-center justify-center min-h-screen text-white">

<div class="relative z-10 backdrop-blur-md bg-white/10 border border-white/20 rounded-3xl p-8 text-center shadow-2xl max-w-md w-[90%]">
    
    <h1 class="text-3xl font-bold mb-3">🌈 ହୋଲି ପର୍ବର ଶୁଭେଚ୍ଛା 🎨</h1>
    
    <p id="sender" class="text-lg font-semibold text-yellow-300 mb-4"></p>

    <input 
        type="text"
        id="nameInput"
        placeholder="ଆପଣଙ୍କ ନାମ ଲେଖନ୍ତୁ"
        class="w-full px-4 py-2 rounded-full text-black text-center mb-3 outline-none"
    >

    <button 
        onclick="shareWhatsApp()"
        class="w-full bg-white text-pink-600 font-bold py-2 rounded-full hover:scale-105 transition mb-2"
    >
        📲 ହ୍ୱାଟସ୍ଆପ୍ ରେ ସେୟାର କରନ୍ତୁ
    </button>

    <button 
        onclick="megaConfetti()"
        class="w-full bg-yellow-300 text-black font-bold py-2 rounded-full hover:scale-105 transition"
    >
        💥 ରଙ୍ଗ ଛିଟନ୍ତୁ
    </button>

</div>

<canvas id="canvas"></canvas>

<script>

/* ===== Name from URL ===== */
var params = new URLSearchParams(window.location.search);
var name = params.get("name") || "ଆପଣଙ୍କ ବନ୍ଧୁ";
document.getElementById("sender").innerText =
name + " ଙ୍କ ପକ୍ଷରୁ ହୋଲି ପର୍ବର ହାର୍ଦ୍ଦିକ ଶୁଭେଚ୍ଛା!";

/* ===== Canvas Setup ===== */
var canvas = document.getElementById("canvas");
var ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* ===== Colors ===== */
function randomColor(){
    var colors=[
        "#ff0080","#ffcc00","#00ffcc",
        "#ff3300","#6600ff","#00ff00",
        "#ff1493","#00bfff","#ffa500"
    ];
    return colors[Math.floor(Math.random()*colors.length)];
}

/* ===== Particle Engine ===== */
var particles=[];

function createParticle(x,y,vx,vy,size,life){
    particles.push({
        x:x,
        y:y,
        vx:vx,
        vy:vy,
        size:size,
        color:randomColor(),
        life:life
    });
}

/* ===== Fountain ===== */
function fountain(x,y){
    for(var i=0;i<50;i++){
        createParticle(
            x,y,
            (Math.random()-0.5)*6,
            (Math.random()-1.5)*6,
            4+Math.random()*4,
            60
        );
    }
}

/* ===== Trail ===== */
function trail(x,y){
    createParticle(x,y,0,0,4,30);
}

/* ===== Mega Confetti ===== */
function megaConfetti(){
    for(var i=0;i<300;i++){
        createParticle(
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            (Math.random()-0.5)*8,
            (Math.random()-1.5)*8,
            5,
            80
        );
    }
}

/* ===== Animation Loop ===== */
function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(var i=0;i<particles.length;i++){
        var p=particles[i];

        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle=p.color;
        ctx.fill();

        p.x+=p.vx;
        p.y+=p.vy;
        p.vy+=0.15;
        p.life--;

        if(p.life<=0){
            particles.splice(i,1);
            i--;
        }
    }

    requestAnimationFrame(animate);
}
animate();

/* ===== Tap Fountain ===== */
canvas.addEventListener("click",function(e){
    fountain(e.clientX,e.clientY);
});

/* ===== Drag Trail ===== */
canvas.addEventListener("mousemove",function(e){
    if(e.buttons===1){
        trail(e.clientX,e.clientY);
    }
});

/* ===== Mobile Support ===== */
canvas.addEventListener("touchstart",function(e){
    var t=e.touches[0];
    fountain(t.clientX,t.clientY);
});
canvas.addEventListener("touchmove",function(e){
    var t=e.touches[0];
    trail(t.clientX,t.clientY);
});

/* ===== WhatsApp Share ===== */
function shareWhatsApp(){
    var entered=document.getElementById("nameInput").value.trim();
    if(entered===""){
        alert("ଦୟାକରି ଆପଣଙ୍କ ନାମ ଲେଖନ୍ତୁ");
        return;
    }

    var base=window.location.origin+window.location.pathname;
    var newUrl=base+"?name="+encodeURIComponent(entered);

    var msg="🌈 ହୋଲି ପର୍ବର ଶୁଭେଚ୍ଛା 🎨\n"
            +entered+" ଙ୍କ ପକ୍ଷରୁ ବିଶେଷ ଶୁଭେଚ୍ଛା!\n"
            +newUrl;

    window.open("https://wa.me/?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
