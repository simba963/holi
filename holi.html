<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(45deg, #ff0080, #ff8c00, #40e0d0, #ff0080);
    background-size: 400% 400%;
    animation: gradient 8s ease infinite;
    overflow: hidden;
    color: white;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

.container {
    position: relative;
    top: 25vh;
    padding: 20px;
}

h1 {
    font-size: 38px;
    animation: bounce 2s infinite;
}

@keyframes bounce {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

#sender {
    font-size: 22px;
    margin-top: 10px;
    font-weight: bold;
    color: #fff200;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 15px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff0080;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

.splash {
    position: absolute;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    animation: explode 1s ease-out forwards;
}

@keyframes explode {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(6); opacity: 0; }
}
</style>
</head>

<body>

<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b3eaa41b2.mp3?filename=happy-holi-110876.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>🌈 हैप्पी होली 🎨</h1>
    <div id="sender"></div>
    <button onclick="confettiBlast()">💥 रंग बरसाओ</button>
    <br>
    <button onclick="shareWhatsApp()">📲 WhatsApp पर शेयर करें</button>
</div>

<script>
// Get name from URL
const params = new URLSearchParams(window.location.search);
const name = params.get("name") || "आपके दोस्त";
document.getElementById("sender").innerText = name + " ki taraf se Happy Holi!";

// Splash anywhere tap
document.addEventListener("click", function(e) {
    for (let i = 0; i < 15; i++) {
        let splash = document.createElement("div");
        splash.className = "splash";
        splash.style.background = randomColor();
        splash.style.left = e.pageX + "px";
        splash.style.top = e.pageY + "px";
        document.body.appendChild(splash);
        setTimeout(() => splash.remove(), 1000);
    }
});

// Confetti blast
function confettiBlast() {
    for (let i = 0; i < 200; i++) {
        let confetti = document.createElement("div");
        confetti.className = "splash";
        confetti.style.background = randomColor();
        confetti.style.left = Math.random() * window.innerWidth + "px";
        confetti.style.top = Math.random() * window.innerHeight + "px";
        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 1500);
    }
}

function randomColor() {
    const colors = ["#ff0080", "#ffcc00", "#00ffcc", "#ff3300", "#6600ff", "#00ff00"];
    return colors[Math.floor(Math.random() * colors.length)];
}

// WhatsApp Share
function shareWhatsApp() {
    let url = window.location.href;
    let text = "🌈 Happy Holi! 🎨 Check this out: " + url;
    window.open("https://wa.me/?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
